starrocks-fe-0:
   image: starrocks/fe-ubuntu:4.1.1
   hostname: starrocks-fe-0
   container_name: starrocks-fe-0
   command:
     - /bin/bash
     - -c
     - |
       /opt/starrocks/fe_entrypoint.sh starrocks-fe-0
   ports:
     - 8030:8030
     - 9020:9020
     - 9030:9030
   environment:
     - AWS_ACCESS_KEY_ID=id
     - AWS_SECRET_ACCESS_KEY=password
     - AWS_REGION=us-east-1
     - TZ=Asia/Jakarta
     - HOST_TYPE=FQDN
   restart: unless-stopped
   volumes:
     - /opt/yamls/data_starrocks_new/singleton_fe0_data:/opt/starrocks/fe/meta
   mem_limit: 8g          # FE nggak perlu sebesar BE
   mem_reservation: 6g
   cpus: "4.0"
 
 starrocks-be-0:
   image: starrocks/be-ubuntu:4.1.1
   command:
     - /bin/bash
     - -c
     - |
       /opt/starrocks/be_entrypoint.sh starrocks-fe-0
   ports:
     - 8040:8040
   hostname: starrocks-be-0
   container_name: starrocks-be-0
   depends_on:
     - starrocks-fe-0
   volumes:
     - /opt/yamls/data_starrocks_new/node1/singleton_be0_data:/opt/starrocks/be/storage
   restart: unless-stopped
   environment:
     - HOST_TYPE=FQDN
     - TZ=Asia/Jakarta
   mem_limit: 20g
   mem_reservation: 14g
   cpus: "6.0"
 
